# This workflow will install Python dependencies, run tests and lint on several OS with a several versions of Python
# See: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Build on Win-MacOS-Ubuntu with Python 3.11-3.13

on:
  push:
    branches: [ "main", "experimental" ]
    paths-ignore:
      - 'README.md'
      - 'Content/**'
  pull_request:
    branches: [ "main", "experimental" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest] #, macos-13] # opensim not supported on macos Intel AMD x64 beyond python 3.11
        python-version: ["3.11", "3.12", "3.13"] # dropped 3.10, not supported by opensim outside of conda

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: |
          uv pip install --system flake8 pytest
          uv pip install --system opensim
          uv pip install --system git+https://github.com/${{ github.repository }}.git@${{ github.sha }}

      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Smoke test CLI entry points
        shell: bash -l {0}
        run: |
          entry_points=(
            AlphaPose_to_OpenPose
            # Blazepose_runsave # requires pip install mediapipe
            bodykin_from_mot_osim
            c3d_to_trc
            calib_easymocap_to_toml
            calib_from_checkerboard
            calib_qca_to_toml
            calib_toml_to_easymocap
            calib_toml_to_opencap
            calib_toml_to_qca
            DLC_to_OpenPose
            face_blurring
            # json_display_with_img # requires cmapy
            json_display_without_img
            MMPose_to_OpenPose
            reproj_from_trc_calib
            trc_combine
            trc_desample
            trc_mot_filter
            trc_from_easymocap
            trc_from_mot_osim
            trc_gaitevents
            trc_plot
            trc_to_c3d
            trc_Zup_to_Yup
          )
          for cmd in "${entry_points[@]}"; do
            echo "Testing: $cmd --help"
            if ! "$cmd" --help >/dev/null 2>&1; then
              echo "❌ Failed to run: $cmd"
              exit 1
            fi
          done

      - name: Test with pytest
        env: 
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
          KMP_DUPLICATE_LIB_OK: TRUE
        run: |
          conda activate pose2sim
          pytest -v Pose2Sim/Utilities/tests.py --capture=sys
