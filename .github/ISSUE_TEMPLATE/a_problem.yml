name: A problem?
description: Your configuration and problem
labels: ["help wanted"]
body:
  - type: dropdown
    id: os
    attributes:
      label: Your OS
      options:
        - Windows
        - Linux
        - Mac

  - type: input
    id: python-version
    attributes:
      label: Your Python version
      description: [Activate your environment](https://perfanalytics.github.io/pose2sim/#1-set-up-a-uv-environment) and run `python -V`
      placeholder: e.g., Python 3.13.3

  - type: input
    id: library-version
    attributes:
      label: What is your library version?
      description: Activate your environment and run `uv pip show pose2sim` (and `uv pip show sports2d` if relevant)
      placeholder: e.g., pose2sim 0.10.45, sports2d 0.8.31

  - type: textarea
    id: additional-info
    attributes:
      label: Your problem
      description: Please describe your problem
      placeholder: Describe your issue here...
